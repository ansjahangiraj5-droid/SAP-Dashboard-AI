<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>AI Smart Dashboard Builder</title>

    <!-- SAP Fiori Horizon Theme via SAPUI5 CDN -->
    <script id="sap-ui-bootstrap"
        src="https://sapui5.hana.ondemand.com/1.120.17/resources/sap-ui-core.js"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-libs="sap.m,sap.f,sap.ui.layout,sap.ui.core,sap.viz,sap.suite.ui.microchart,sap.ui.unified"
        data-sap-ui-compatVersion="edge"
        data-sap-ui-async="true"
        data-sap-ui-frameOptions="trusted"
        data-sap-ui-resourceroots='{"ai.dashboard": "./"}'
        data-sap-ui-oninit="module:sap/ui/core/ComponentSupport">
    </script>

    <!-- SheetJS (xlsx) for Excel parsing -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

    <!-- FileSaver for export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"
        integrity="sha512-Ql88B6MnL0djFBl5HhWEMw27vFDAqfMh4Gn7e08vW1ZEaQhICbj7Z8cmLjLDzuFYXgbFq2pCmD1G3d6RPd6g=="
        crossorigin="anonymous"></script>

    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
    </style>
</head>
<body class="sapUiBody" id="content">
    <!-- ComponentSupport will bootstrap the component from manifest -->
    <div
        data-sap-ui-component
        data-name="ai.dashboard"
        data-id="container"
        data-settings='{"id":"AIDashboard"}'
        data-handle-validation="true"
        style="height:100%">
    </div>
</body>
</html>
